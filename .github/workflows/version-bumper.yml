name: Auto Bump Version

on:
  workflow_run:
    # Must match the exact "name:" fields of your other workflow files
    workflows: ["Lint", "Test", "Security", "Build"]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Only run if ALL four workflows completed successfully
    # and the commit wasn't the version bump itself
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    env:
      NEW_VERSION: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine Bump Type
        id: bump
        run: |
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          PATTERN="^([a-zA-Z]+)\(([^)]+)\):"

          if [[ "$COMMIT_MSG" =~ $PATTERN ]]; then
            TYPE="${BASH_REMATCH[1]}"
            SCOPE="${BASH_REMATCH[2]}"

            if [[ "$TYPE" == "feat" && "$SCOPE" == "new-module" ]]; then
              echo "type=minor" >> $GITHUB_OUTPUT
              echo "Detected new module feature. Bumping MINOR."
            else
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "Detected standard update. Bumping PATCH."
            fi
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Unrecognized format. Defaulting to PATCH."
          fi

      - name: Update pyproject.toml
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          python -c "
          import re, sys, os
          bump_type = os.environ['BUMP_TYPE']

          try:
              with open('pyproject.toml', 'r') as f:
                  content = f.read()
          except FileNotFoundError:
              print('❌ pyproject.toml not found!')
              sys.exit(1)

          match = re.search(r'version\s*=\s*\"(\d+)\.(\d+)\.(\d+)\"', content)
          if not match:
              print('❌ Version string not found in pyproject.toml')
              sys.exit(1)

          major, minor, patch = map(int, match.groups())

          if bump_type == 'minor':
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f'{major}.{minor}.{patch}'
          new_content = re.sub(r'version\s*=\s*\"\d+\.\d+\.\d+\"', f'version = \"{new_version}\"', content)

          with open('pyproject.toml', 'w') as f:
              f.write(new_content)

          print(f'✅ Successfully bumped version to {new_version}')

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'NEW_VERSION={new_version}\n')
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml

          if git diff --staged --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(version): bump version to ${{ env.NEW_VERSION }} [skip ci]"
            git push
          fi
          
